info:
  name: Switch provider
  type: http
  seq: 4

http:
  method: POST
  url: http://localhost:3000/provider
  body:
    type: json
    data: |-
      {
        "provider": "smtp"
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("status 200", () => expect(res.status).to.equal(200));
        test("returns provider", () => expect(res.body.provider).to.equal("smtp"));

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
